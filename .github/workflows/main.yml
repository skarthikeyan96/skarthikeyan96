name: Waka time stats

on:
  workflow_dispatch:
  schedule:
    # Runs on every saturday
    - cron: "5 0 * * 6"

jobs:
  update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
